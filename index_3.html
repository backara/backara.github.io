



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <script type="text/javascript" src="https://dembuon.vn/lib/xmas.js"></script>
    <title>Noel Celebration</title>
    <style>
        body {
            background-color: #002b36;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            margin: 10px 0;
            font-size: 2rem;
        }

        .scene {
            position: relative;
            width: 100%;
            height: 80%;
            overflow: hidden;
        }

        .tree {
            position: absolute;
            left: 50%;
            bottom: 10%;
            transform: translateX(-50%);
        }

        .tree .triangle {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            border-left: 120px solid transparent;
            border-right: 120px solid transparent;
            border-bottom: 160px solid #2ecc71;
        }

        .tree .triangle:nth-child(2) {
            top: -140px;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-bottom: 140px solid #27ae60;
        }

        .tree .triangle:nth-child(3) {
            top: -260px;
            border-left: 80px solid transparent;
            border-right: 80px solid transparent;
            border-bottom: 120px solid #1e8449;
        }

        .tree .base {
            position: absolute;
            top: 160px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 80px;
            background-color: #8b4513;
        }

        .snowman {
            position: absolute;
            bottom: 10%;
            left: 10%;
        }

        .snowman .circle {
            background-color: white;
            border-radius: 50%;
            position: absolute;
        }

        .snowman .circle:nth-child(1) {
            width: 80px;
            height: 80px;
            bottom: 0;
        }

        .snowman .circle:nth-child(2) {
            width: 60px;
            height: 60px;
            bottom: 80px;
            left: 10px;
        }

        .snowman .circle:nth-child(3) {
            width: 40px;
            height: 40px;
            bottom: 140px;
            left: 20px;
        }

        .reindeer {
            position: absolute;
            bottom: 10%;
            right: 10%;
        }

        .reindeer .body {
            width: 80px;
            height: 40px;
            background-color: #964b00;
            border-radius: 20px;
            position: relative;
        }

        .reindeer .antlers {
            position: absolute;
            width: 40px;
            height: 20px;
            top: -20px;
            background-color: #4d2600;
            border-radius: 10px;
        }

        .couple {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
        }

        .couple .person {
            width: 30px;
            height: 60px;
            background-color: pink;
            border-radius: 15px;
        }

        .couple .person.male {
            background-color: lightblue;
        }

    </style>
</head>
<body>
    <h1>Chúc mừng Giáng Sinh</h1>
    <div class="scene">
        <!-- Tree -->
        <div class="tree">
            <div class="triangle"></div>
            <div class="triangle"></div>
            <div class="triangle"></div>
            <div class="base"></div>
        </div>

        <!-- Snowman -->
        <div class="snowman">
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
        </div>

        <!-- Reindeer -->
        <div class="reindeer">
            <div class="body"></div>
            <div class="antlers"></div>
        </div>

        <!-- Couple -->
        <div class="couple">
            <div class="person male"></div>
            <div class="person female"></div>
        </div>
    </div>
</body>
</html>
